<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 350" width="450" height="350">
  <rect width="450" height="350" fill="white" rx="8"/>
  
  <!-- Front face 26×30 -->
  <polygon points="80,260 80,50 270,50 270,260" fill="#e8f6fe" stroke="#1e375a" stroke-width="3"/>
  
  <!-- Top face 26×18 -->
  <polygon points="80,50 170,20 360,20 270,50" fill="#d0ebf9" stroke="#1e375a" stroke-width="3"/>
  
  <!-- Right face 18×30 -->
  <polygon points="270,50 360,20 360,230 270,260" fill="#b8def5" stroke="#1e375a" stroke-width="3"/>
  
  <!-- Length -->
  <line x1="80" y1="285" x2="270" y2="285" stroke="#00abe4" stroke-width="2"/>
  <text x="175" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold">26 cm（長）</text>
  
  <!-- Width -->
  <line x1="270" y1="42" x2="360" y2="12" stroke="#00abe4" stroke-width="2"/>
  <text x="325" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold">18 cm（闊）</text>
  
  <!-- Height -->
  <line x1="375" y1="125" x2="375" y2="245" stroke="#00abe4" stroke-width="2"/>
  <text x="390" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold">30 cm</text>
  <text x="390" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c" font-weight="bold">（高 = 26+4）</text>
  
  <line x1="80" y1="260" x2="170" y2="230" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="170" y1="230" x2="360" y2="200" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="170" y1="20" x2="170" y2="230" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
</svg>