<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380">
  <rect width="500" height="380" fill="white" rx="8"/>
  
  <!-- Main cuboid 8×6×4 → showing as 4×3×2 cubes (each 2cm) -->
  <polygon points="80,260 80,70 330,70 330,260" fill="#e8f6fe" stroke="#1e375a" stroke-width="3"/>
  <polygon points="80,70 200,40 450,40 330,70" fill="#d0ebf9" stroke="#1e375a" stroke-width="3"/>
  <polygon points="330,70 450,40 450,230 330,260" fill="#b8def5" stroke="#1e375a" stroke-width="3"/>
  
  <!-- Grid lines on front face - showing 4 columns × 2 rows -->
  <line x1="142" y1="70" x2="142" y2="260" stroke="#00abe4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="205" y1="70" x2="205" y2="260" stroke="#00abe4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="268" y1="70" x2="268" y2="260" stroke="#00abe4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="80" y1="165" x2="330" y2="165" stroke="#00abe4" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Grid lines on top face -->
  <line x1="142" y1="62" x2="232" y2="32" stroke="#00abe4" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="205" y1="55" x2="295" y2="25" stroke="#00abe4" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="268" y1="47" x2="358" y2="17" stroke="#00abe4" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="140" y1="37" x2="80" y2="67" stroke="#00abe4" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="200" y1="30" x2="140" y2="60" stroke="#00abe4" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- ===== Small cubes cut out (right side, showing separation) ===== -->
  <g transform="translate(380, 60)">
    <!-- 4 small cubes in a row -->
    <rect x="0" y="0" width="35" height="35" fill="#f0c4c4" stroke="#e74c3c" stroke-width="2" rx="3"/>
    <rect x="40" y="0" width="35" height="35" fill="#f0c4c4" stroke="#e74c3c" stroke-width="2" rx="3"/>
    <rect x="0" y="40" width="35" height="35" fill="#f0c4c4" stroke="#e74c3c" stroke-width="2" rx="3"/>
    <rect x="40" y="40" width="35" height="35" fill="#f0c4c4" stroke="#e74c3c" stroke-width="2" rx="3"/>
    <text x="37" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">2 cm</text>
    <text x="37" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">小正方體</text>
    
    <line x1="0" y1="90" x2="75" y2="90" stroke="#e74c3c" stroke-width="1"/>
  </g>
  
  <line x1="450" y1="100" x2="455" y2="100" stroke="#e74c3c" stroke-width="1.5"/>
  
  <!-- Dimensions -->
  <line x1="80" y1="285" x2="330" y2="285" stroke="#00abe4" stroke-width="2"/>
  <text x="205" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold">8 cm（長）</text>
  
  <line x1="330" y1="62" x2="450" y2="32" stroke="#00abe4" stroke-width="2"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold">6 cm（闊）</text>
  
  <line x1="57" y1="70" x2="57" y2="260" stroke="#00abe4" stroke-width="2"/>
  <text x="48" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold" transform="rotate(-90, 48, 165)">4 cm（高）</text>
  
  <line x1="80" y1="260" x2="200" y2="230" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="200" y1="230" x2="450" y2="200" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="200" y1="40" x2="200" y2="230" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
</svg>