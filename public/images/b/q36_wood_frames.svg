  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e375a" font-weight="bold">12 m 木材</text>
  <!-- Cut marks -->
  <line x1="215" y1="20" x2="215" y2="80" stroke="#e74c3c" stroke-width="2"/>
  <line x1="370" y1="20" x2="370" y2="80" stroke="#e74c3c" stroke-width="2"/>
  <!-- Picture frames below -->
  <rect x="40" y="110" width="140" height="50" fill="none" stroke="#1e375a" stroke-width="2.5" rx="4"/>
