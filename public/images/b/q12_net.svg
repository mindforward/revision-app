<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <rect width="500" height="400" fill="white" rx="8"/>
  
  <!-- Net of cuboid 3.5×3.5×14 -->
  <!-- Top face: 3.5×3.5 -->
  <rect x="200" y="20" width="100" height="100" fill="#d0ebf9" stroke="#1e375a" stroke-width="2.5"/>
  <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a">3.5 cm</text>
  
  <!-- Front face: 14×3.5 -->
  <rect x="200" y="120" width="100" height="130" fill="#e8f6fe" stroke="#1e375a" stroke-width="2.5"/>
  <text x="250" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a">14 cm</text>
  <text x="250" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00abe4">（高）</text>
  
  <!-- Right face: 3.5×3.5 -->
  <rect x="300" y="120" width="100" height="100" fill="#b8def5" stroke="#1e375a" stroke-width="2.5"/>
  <text x="340" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a">3.5 cm</text>
  
  <!-- Bottom face -->
  <rect x="200" y="250" width="100" height="100" fill="#c5e4f7" stroke="#1e375a" stroke-width="2.5"/>
  <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a">3.5 cm</text>
  
  <!-- Left face -->
  <rect x="100" y="120" width="100" height="100" fill="#c5e4f7" stroke="#1e375a" stroke-width="2.5"/>
  <text x="140" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a">3.5 cm</text>
  
  <!-- Fold arrows -->
  <path d="M 230 120 L 230 100" stroke="#e74c3c" stroke-width="2" marker-end="url(#redArrow)"/>
  <path d="M 270 120 L 270 100" stroke="#e74c3c" stroke-width="2" marker-end="url(#redArrow)"/>
  <path d="M 230 250 L 230 270" stroke="#e74c3c" stroke-width="2" marker-end="url(#redArrow)"/>
  <path d="M 270 250 L 270 270" stroke="#e74c3c" stroke-width="2" marker-end="url(#redArrow)"/>
  
  <!-- Width dimension on top face -->
  <line x1="200" y1="15" x2="300" y2="15" stroke="#00abe4" stroke-width="1.5"/>
  <text x="250" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00abe4" font-weight="bold">3.5 cm</text>
  
  <!-- Height dimension on front face -->
  <line x1="315" y1="120" x2="315" y2="250" stroke="#00abe4" stroke-width="1.5"/>
  <text x="328" y="190" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#00abe4" font-weight="bold">14 cm</text>
  
  <defs>
    <marker id="redArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <text x="250" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">↑ 沿虛線摺起 ↑</text>
</svg>