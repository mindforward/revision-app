<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="white" rx="8"/>
  
  <!-- Main rectangle -->
  <rect x="80" y="80" width="240" height="140" fill="#e8f6fe" stroke="#1e375a" stroke-width="3"/>
  
  <!-- Length label (horizontal) -->
  <line x1="80" y1="240" x2="320" y2="240" stroke="#00abe4" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1e375a" font-weight="bold">3¼ m（長）</text>
  
  <!-- Width label (vertical) -->
  <line x1="50" y1="80" x2="50" y2="220" stroke="#00abe4" stroke-width="2" marker-start="url(#arrowStartV)" marker-end="url(#arrowEndV)"/>
  <text x="30" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1e375a" font-weight="bold" transform="rotate(-90, 30, 150)">? m（闊）</text>
  
  <!-- Area label inside -->
  <text x="200" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#00abe4" font-weight="bold">面積 = 7½ m²</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00abe4"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#00abe4"/>
    </marker>
    <marker id="arrowEndV" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#00abe4"/>
    </marker>
    <marker id="arrowStartV" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 10 L 10 10 L 5 0 z" fill="#00abe4"/>
    </marker>
  </defs>
</svg>