  <rect x="360" y="110" width="100" height="50" fill="none" stroke="#1e375a" stroke-width="2.5" rx="4"/>
  <text x="110" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e375a">¾ m</text>
  <text x="270" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e375a">¾ m</text>
  <text x="410" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">?</text>
  <text x="250" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a">12 ÷ ¾ = ? 個畫框</text>
