<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 380" width="450" height="380">
  <rect width="450" height="380" fill="white" rx="8"/>
  
  <!-- Container outer -->
  <polygon points="70,270 70,40 300,40 300,270" fill="#f0f8ff" stroke="#1e375a" stroke-width="3"/>
  <polygon points="70,40 170,10 400,10 300,40" fill="#e8f4fd" stroke="#1e375a" stroke-width="3"/>
  <polygon points="300,40 400,10 400,240 300,270" fill="#dceefb" stroke="#1e375a" stroke-width="3"/>
  
  <!-- Water fill (blue, partially transparent) -->
  <polygon points="70,190 300,190 400,160 170,160" fill="rgba(0,171,228,0.25)" stroke="none"/>
  <polygon points="70,190 70,270 300,270 300,190" fill="rgba(0,171,228,0.25)" stroke="none"/>
  <polygon points="300,190 300,270 400,240 400,160" fill="rgba(0,171,228,0.3)" stroke="none"/>
  
  <!-- Water surface line -->
  <line x1="70" y1="190" x2="300" y2="190" stroke="#00abe4" stroke-width="2.5" stroke-dasharray="8,5"/>
  <line x1="300" y1="190" x2="400" y2="160" stroke="#00abe4" stroke-width="2.5" stroke-dasharray="8,5"/>
  
  <text x="140" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#00abe4" font-weight="bold">水 14,000 cm³</text>
  
  <!-- Water level label -->
  <line x1="415" y1="160" x2="415" y2="190" stroke="#00abe4" stroke-width="2"/>
  <text x="430" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#00abe4" font-weight="bold">? cm</text>
  
  <!-- Dimensions -->
  <line x1="70" y1="295" x2="300" y2="295" stroke="#00abe4" stroke-width="2"/>
  <text x="185" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold">35 cm（長）</text>
  
  <line x1="300" y1="32" x2="400" y2="2" stroke="#00abe4" stroke-width="2"/>
  <text x="360" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold">20 cm（闊）</text>
  
  <line x1="57" y1="40" x2="57" y2="270" stroke="#00abe4" stroke-width="2"/>
  <text x="48" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold" transform="rotate(-90, 48, 155)">? cm</text>
  
  <line x1="70" y1="270" x2="170" y2="240" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="170" y1="240" x2="400" y2="210" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="170" y1="10" x2="170" y2="240" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
</svg>