<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 220" width="550" height="220">
  <rect width="550" height="220" fill="white" rx="8"/>
  
  <!-- 6 bags red beans -->
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="15" fill="#1e375a" font-weight="bold">6 袋紅豆</text>
  
  <rect x="40" y="55" width="50" height="50" fill="#f0c4c4" stroke="#e74c3c" stroke-width="2" rx="4"/>
  <rect x="95" y="55" width="50" height="50" fill="#f0c4c4" stroke="#e74c3c" stroke-width="2" rx="4"/>
  <rect x="150" y="55" width="50" height="50" fill="#f0c4c4" stroke="#e74c3c" stroke-width="2" rx="4"/>
  <rect x="205" y="55" width="50" height="50" fill="#f0c4c4" stroke="#e74c3c" stroke-width="2" rx="4"/>
  <rect x="260" y="55" width="50" height="50" fill="#f0c4c4" stroke="#e74c3c" stroke-width="2" rx="4"/>
  <rect x="315" y="55" width="50" height="50" fill="#f0c4c4" stroke="#e74c3c" stroke-width="2" rx="4"/>
  
  <text x="65" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">?</text>
  <text x="120" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">?</text>
  <text x="175" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">?</text>
  <text x="230" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">?</text>
  <text x="285" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">?</text>
  <text x="340" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">?</text>
  
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="15" fill="#1e375a" font-weight="bold">+ 1 袋綠豆</text>
  <rect x="40" y="140" width="50" height="50" fill="#c4f0c4" stroke="#27ae60" stroke-width="2" rx="4"/>
  <text x="65" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">2 kg</text>
  
  <text x="185" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#1e375a">= 20 kg</text>
  
  <text x="155" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a">每袋紅豆 = (20 − 2) ÷ 6 = ?</text>
</svg>