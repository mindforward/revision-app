<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 250" width="450" height="250">
  <rect width="450" height="250" fill="white" rx="8"/>
  
  <!-- Big box 15 kg -->
  <rect x="50" y="40" width="120" height="150" fill="#e8f6fe" stroke="#1e375a" stroke-width="3" rx="5"/>
  <text x="110" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#1e375a" font-weight="bold">☕ 咖啡豆</text>
  <text x="110" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#00abe4" font-weight="bold">15 kg</text>
  
  <!-- Arrow -->
  <text x="210" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#00abe4">→</text>
  
  <!-- Small boxes 2½ kg each -->
  <rect x="260" y="60" width="70" height="70" fill="#d0ebf9" stroke="#1e375a" stroke-width="2.5" rx="4"/>
  <text x="295" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e375a">2½ kg</text>
  
  <rect x="345" y="60" width="70" height="70" fill="#d0ebf9" stroke="#1e375a" stroke-width="2.5" rx="4"/>
  <text x="380" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e375a">2½ kg</text>
  
  <rect x="260" y="145" width="70" height="70" fill="#d0ebf9" stroke="#1e375a" stroke-width="2.5" rx="4"/>
  <text x="295" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e375a">2½ kg</text>
  
  <rect x="345" y="145" width="70" height="70" fill="#d0ebf9" stroke="#1e375a" stroke-width="2.5" rx="4"/>
  <text x="380" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e375a">2½ kg</text>
  
  <text x="340" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e74c3c">還能再裝 2 盒...</text>
  
  <!-- 15 ÷ 2.5 = 6 盒 -->
  <text x="110" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a">15 ÷ 2½ = ?</text>
</svg>