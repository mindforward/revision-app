<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 300" width="550" height="300">
  <rect width="550" height="300" fill="white" rx="8"/>
  <text x="275" y="28" text-anchor="middle" font-family="Noto Sans SC, Arial" font-size="18" fill="#1e375a" font-weight="bold">🎼 管弦樂團 Orchestra</text>
  
  <!-- Woodwind -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#e8f6fe" stroke="#00abe4" stroke-width="2"/>
    <text x="75" y="35" text-anchor="middle" font-size="14" fill="#1e375a" font-weight="bold">木管 Woodwind</text>
    <text x="75" y="60" text-anchor="middle" font-size="11" fill="#1e375a">Flute 長笛</text>
    <text x="75" y="75" text-anchor="middle" font-size="11" fill="#1e375a">Clarinet 單簧管</text>
    <text x="75" y="90" text-anchor="middle" font-size="11" fill="#1e375a">Oboe / Bassoon</text>
  </g>
  
  <!-- Brass -->
  <g transform="translate(190, 50)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#d0ebf9" stroke="#00abe4" stroke-width="2"/>
    <text x="75" y="35" text-anchor="middle" font-size="14" fill="#1e375a" font-weight="bold">銅管 Brass</text>
    <text x="75" y="60" text-anchor="middle" font-size="11" fill="#1e375a">Trumpet 小號</text>
    <text x="75" y="75" text-anchor="middle" font-size="11" fill="#1e375a">Horn 圓號</text>
    <text x="75" y="90" text-anchor="middle" font-size="11" fill="#1e375a">Trombone / Tuba</text>
  </g>
  
  <!-- Percussion -->
  <g transform="translate(360, 50)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#b8def5" stroke="#00abe4" stroke-width="2"/>
    <text x="75" y="35" text-anchor="middle" font-size="14" fill="#1e375a" font-weight="bold">敲擊 Percussion</text>
    <text x="75" y="60" text-anchor="middle" font-size="11" fill="#1e375a">Timpani 定音鼓</text>
    <text x="75" y="75" text-anchor="middle" font-size="11" fill="#1e375a">Snare Drum 小鼓</text>
    <text x="75" y="90" text-anchor="middle" font-size="11" fill="#1e375a">Cymbals 鈸</text>
  </g>
  
  <!-- Also strings -->
  <g transform="translate(105, 170)">
    <rect x="0" y="0" width="300" height="80" rx="10" fill="#f0e8c4" stroke="#e67e22" stroke-width="2"/>
    <text x="150" y="30" text-anchor="middle" font-size="14" fill="#1e375a" font-weight="bold">也可包括 May also include:</text>
    <text x="150" y="55" text-anchor="middle" font-size="12" fill="#1e375a">Violin（小提琴）• Harp（豎琴）• Piano（鋼琴）</text>
  </g>
  
  <text x="275" y="275" text-anchor="middle" font-family="Noto Sans SC, Arial" font-size="12" fill="#00abe4">管弦樂團也稱為交響樂團 Symphony / Concert Orchestra</text>
</svg>