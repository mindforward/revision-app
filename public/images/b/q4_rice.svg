<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 280" width="450" height="280">
  <rect width="450" height="280" fill="white" rx="8"/>
  
  <!-- Rice bag -->
  <ellipse cx="100" cy="130" rx="60" ry="70" fill="#f0e8c4" stroke="#1e375a" stroke-width="3"/>
  <text x="100" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#1e375a" font-weight="bold">🍚</text>
  <text x="100" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#00abe4" font-weight="bold">3½ kg</text>
  
  <!-- Arrow -->
