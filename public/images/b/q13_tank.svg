<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 350" width="450" height="350">
  <rect width="450" height="350" fill="white" rx="8"/>
  
  <!-- Tank body -->
  <polygon points="70,260 70,50 290,50 290,260" fill="#e8f6fe" stroke="#1e375a" stroke-width="3"/>
  <polygon points="70,50 170,20 390,20 290,50" fill="#d0ebf9" stroke="#1e375a" stroke-width="3"/>
  <polygon points="290,50 390,20 390,230 290,260" fill="#b8def5" stroke="#1e375a" stroke-width="3"/>
  
  <!-- Water fill -->
  <polygon points="70,180 290,180 390,150 170,150" fill="rgba(0,171,228,0.2)" stroke="none"/>
  <polygon points="70,180 70,260 290,260 290,180" fill="rgba(0,171,228,0.2)" stroke="none"/>
  <polygon points="290,180 290,260 390,230 390,150" fill="rgba(0,171,228,0.25)" stroke="none"/>
  
  <text x="160" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#00abe4" font-weight="bold">水箱</text>
  <text x="160" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a">1 L = 1,000 cm³</text>
  
  <line x1="70" y1="285" x2="290" y2="285" stroke="#00abe4" stroke-width="2"/>
  <text x="180" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold">40 cm（長）</text>
  
  <line x1="290" y1="42" x2="390" y2="12" stroke="#00abe4" stroke-width="2"/>
  <text x="350" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold">25 cm（闊）</text>
  
  <line x1="57" y1="50" x2="57" y2="260" stroke="#00abe4" stroke-width="2"/>
  <text x="48" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1e375a" font-weight="bold" transform="rotate(-90, 48, 155)">30 cm（高）</text>
  
  <line x1="70" y1="260" x2="170" y2="230" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="170" y1="230" x2="390" y2="200" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="170" y1="20" x2="170" y2="230" stroke="#1e375a" stroke-width="1.5" stroke-dasharray="6,4"/>
</svg>