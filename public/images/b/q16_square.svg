<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" width="480" height="280">
  <rect width="480" height="280" fill="white" rx="8"/>
  
  <!-- Original square 6cm → 80×80 -->
  <rect x="60" y="50" width="100" height="100" fill="#e8f6fe" stroke="#1e375a" stroke-width="3"/>
  <line x1="60" y1="170" x2="160" y2="170" stroke="#00abe4" stroke-width="1.5"/>
  <text x="110" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e375a" font-weight="bold">6 cm</text>
  <line x1="40" y1="50" x2="40" y2="150" stroke="#00abe4" stroke-width="1.5"/>
  <text x="32" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e375a" font-weight="bold" transform="rotate(-90, 32, 100)">6 cm</text>
  <text x="110" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00abe4">面積 = 36 cm²</text>
  <text x="110" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a" font-weight="bold">原正方形</text>
  
  <!-- Arrow -->
  <text x="210" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#00abe4">→</text>
  
  <!-- Doubled square 12cm → 160×160 -->
  <rect x="260" y="20" width="200" height="200" fill="#d0ebf9" stroke="#1e375a" stroke-width="3"/>
  <line x1="260" y1="240" x2="460" y2="240" stroke="#00abe4" stroke-width="1.5"/>
  <text x="360" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e375a" font-weight="bold">12 cm（6×2）</text>
  <line x1="240" y1="20" x2="240" y2="220" stroke="#00abe4" stroke-width="1.5"/>
  <text x="232" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e375a" font-weight="bold" transform="rotate(-90, 232, 120)">12 cm</text>
  <text x="360" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c" font-weight="bold">面積 = 144 cm²</text>
  <text x="360" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c" font-weight="bold">= 36 × 4</text>
  <text x="360" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a" font-weight="bold">邊長加倍</text>
</svg>