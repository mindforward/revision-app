    <rect x="10" y="65" width="40" height="35" fill="#d0ebf9" stroke="#1e375a" stroke-width="1.5" rx="3"/>
    <text x="30" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e375a">? kg</text>
  </g>
  <g transform="translate(340, 40)">
    <circle cx="30" cy="40" r="20" fill="#e8f6fe" stroke="#1e375a" stroke-width="2"/>
    <text x="30" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e375a">朋友B</text>
    <rect x="10" y="65" width="40" height="35" fill="#d0ebf9" stroke="#1e375a" stroke-width="1.5" rx="3"/>
    <text x="30" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e375a">? kg</text>
  </g>
  <g transform="translate(240, 160)">
    <circle cx="30" cy="40" r="20" fill="#e8f6fe" stroke="#1e375a" stroke-width="2"/>
    <text x="30" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e375a">朋友C</text>
    <rect x="10" y="65" width="40" height="35" fill="#d0ebf9" stroke="#1e375a" stroke-width="1.5" rx="3"/>
    <text x="30" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e375a">? kg</text>
  </g>
  <g transform="translate(300, 160)">
    <circle cx="30" cy="40" r="20" fill="#e8f6fe" stroke="#1e375a" stroke-width="2"/>
    <text x="30" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e375a">朋友D</text>
    <rect x="10" y="65" width="40" height="35" fill="#d0ebf9" stroke="#1e375a" stroke-width="1.5" rx="3"/>
    <text x="30" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e375a">? kg</text>
  </g>
  
  <text x="180" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e375a">每人分得相同重量 → 3½ ÷ 5 = ?</text>
